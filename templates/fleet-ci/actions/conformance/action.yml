name: "Conformance"
description: "Run FLUX ISA conformance tests"

inputs:
  isa_version:
    description: "FLUX ISA version to test against"
    required: false
    default: "2.0"
  fleet_token:
    description: "GitHub token for fleet access"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up conformance environment
      shell: bash
      run: |
        echo "⚡ Running FLUX ISA conformance tests (v${{ inputs.isa_version }})"

    - name: Check for conformance test runner
      shell: bash
      run: |
        # Look for conformance test definitions
        CONF_DIR=""
        for dir in tests/conformance conformance spec/tests isa/tests; do
          if [ -d "$dir" ]; then
            CONF_DIR="$dir"
            break
          fi
        done

        if [ -z "$CONF_DIR" ]; then
          echo "ℹ️  No conformance test directory found"
          exit 0
        fi

        echo "📁 Found conformance tests in: $CONF_DIR"
        echo "CONF_DIR=$CONF_DIR" >> $GITHUB_ENV

    - name: Run conformance tests (Python)
      if: hash pytest 2>/dev/null
      shell: bash
      run: |
        if [ -n "$CONF_DIR" ] && [ -d "$CONF_DIR" ]; then
          pytest "$CONF_DIR" -v \
            --junitxml=conformance-results/conformance.xml \
            --tb=short || true

          # Generate conformance report
          mkdir -p conformance-results
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, json, os

          xml_path = "conformance-results/conformance.xml"
          if os.path.exists(xml_path):
              tree = ET.parse(xml_path)
              root = tree.getroot()
              tests = root.findall(".//testcase")
              passed = sum(1 for t in tests if len(t) == 0)
              failed = sum(1 for t in tests if len(t) > 0)
              total = len(tests)

              report = {
                  "total": total,
                  "passed": passed,
                  "failed": failed,
                  "pass_rate": round((passed / total * 100) if total > 0 else 0, 1),
                  "isa_version": "${{ inputs.isa_version }}",
                  "timestamp": "${{ github.event.head_commit.timestamp || '' }}"
              }

              with open("conformance-results/results.json", "w") as f:
                  json.dump(report, f, indent=2)

              print(f"📊 Conformance: {passed}/{total} ({report['pass_rate']}%)")
          PYEOF
        fi

    - name: Run conformance tests (Rust)
      if: hash cargo 2>/dev/null
      shell: bash
      continue-on-error: true
      run: |
        if cargo test --help | grep -q "conformance" 2>/dev/null; then
          cargo test -- conformance --nocapture
        elif [ -n "$CONF_DIR" ]; then
          echo "ℹ️  No cargo conformance integration found"
        fi
